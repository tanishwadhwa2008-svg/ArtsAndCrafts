# Local development infrastructure for the Arts & Handicrafts monorepo.
# Usage: `pnpm docker:up` (start) / `pnpm docker:down` (stop).
# Values are read from the root `.env` (copy from `.env.example`).

services:
  postgres:
    image: postgres:16-alpine
    container_name: arts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arts}
      POSTGRES_DB: ${POSTGRES_DB:-arts_dev}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arts} -d ${POSTGRES_DB:-arts_dev}']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: arts-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: create the media bucket on first run.
  minio-setup:
    image: minio/mc:latest
    container_name: arts-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-arts-media};
      mc anonymous set download local/${S3_BUCKET:-arts-media};
      exit 0;
      "

volumes:
  postgres-data:
  minio-data:
